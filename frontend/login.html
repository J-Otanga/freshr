<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Freshr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 antialiased flex flex-col min-h-screen justify-between">

    <header class="bg-white border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-7 h-7 border-2 border-blue-600 relative flex items-center justify-center font-bold text-blue-600 text-sm">
                    X
                </div>
                <span class="text-lg font-bold text-blue-600 tracking-tight">Freshr</span>
            </a>
            <a href="signup.html" class="text-xs font-medium text-gray-600 hover:text-gray-900 transition">New here? Register</a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 my-8">
        <div class="bg-white border border-gray-200/60 rounded-xl shadow-sm max-w-md w-full p-6 sm:p-8">
            <div class="text-center mb-6">
                <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Welcome back</h1>
                <p class="text-xs text-gray-500 mt-1">Log in to manage your AI job matches and CVs.</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label for="email" class="block text-xs font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com"
                           class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs transition">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-xs font-medium text-gray-700">Password</label>
                        <a href="#" class="text-[11px] text-blue-600 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••"
                           class="w-full px-3 py-2 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-xs transition">
                </div>

                <div class="flex items-center pt-1">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <label for="remember" class="ml-2 text-[11px] text-gray-500">Remember me on this device</label>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition text-xs mt-2">
                    Log In
                </button>
            </form>
        </div>
    </main>

    <footer class="py-4 text-center border-t border-gray-100 bg-white">
        <p class="text-[10px] text-gray-400 font-light">© 2026 Freshr.co.ke. All rights reserved.</p>
    </footer>

    <script>
        async function handleLogin(e) {
            e.preventDefault(); // Stop the form from reloading the page
            
            // 1. Grab the values from your input fields
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Optional: UI feedback while loading
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = "Logging In...";
            submitBtn.disabled = true;

            try {
                // 2. Format the data EXACTLY how FastAPI's OAuth2 expects it
                const formData = new URLSearchParams();
                formData.append('username', email); // Must be 'username', not 'email'
                formData.append('password', password);

                // 3. Send the request to your backend
                const response = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                // 4. Check if the login was successful
                if (response.ok) {
                    // Save the JWT VIP wristband to the browser
                    localStorage.setItem('token', data.access_token);
                    
                    // Redirect to the protected dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Handle incorrect passwords or missing accounts
                    alert("Login failed: " + (data.detail || "Incorrect credentials"));
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                }

            } catch (error) {
                // Handle network errors
                console.error("Error connecting to the server:", error);
                alert("Could not connect to the server. Is your backend running?");
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
