<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Freshr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-gray-900 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-xl my-4">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold tracking-wide text-[#2563EB]">Freshr</h1>
            <p class="text-xs text-gray-500 mt-1">Create Administrative Account</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl shadow-sm p-6">
            <div class="mb-5">
                <h2 class="text-lg font-bold text-gray-900">Register Admin</h2>
                <p class="text-xs text-gray-400 mt-0.5">Set up management profiles to handle job spaces and tracking summaries.</p>
            </div>

            <form id="registerForm" class="space-y-4">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">Full Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </span>
                            <input id="name" type="text" required placeholder="Alex Mercer" class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-xs">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">Work Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path></svg>
                            </span>
                            <input id="email" type="email" required placeholder="name@freshr.com" class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-xs">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </span>
                            <input id="password" type="password" required placeholder="Create password" class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-xs">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1.5">Platform Access Code</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                            </span>
                            <input id="accessCode" type="password" required placeholder="Master-key token" class="w-full pl-9 pr-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-xs">
                        </div>
                    </div>

                </div>

                <div class="flex items-start pt-1">
                    <input id="terms" name="terms" type="checkbox" required class="h-4 w-4 mt-0.5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="terms" class="ml-2 block text-xs text-gray-500 select-none">
                        I certify that I am authorized to assume an admin identity on this product scope.
                    </label>
                </div>

                <button type="submit" class="w-full py-2.5 bg-[#2563EB] rounded-lg text-xs font-semibold text-white hover:bg-blue-700 transition shadow-sm mt-2">
                    Complete Setup
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-400 mt-4">
            Already have an active account? <a href="login.html" class="text-blue-600 font-medium hover:underline">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                full_name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                access_code: document.getElementById('accessCode').value
            };

            try {
                // Changed to port 8000 assuming default FastAPI config, update to 5000 if your backend requires it
                const response = await fetch('http://localhost:8000/api/admin/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("Admin registered! Please log in.");
                    window.location.href = 'login.html';
                } else {
                    const err = await response.json();
                    alert("Error: " + (err.detail || "Registration failed"));
                }
            } catch (error) {
                alert('Connection error. Is your FastAPI server running?');
                console.error(error);
            }
        });
    </script>
</body>
</html>
