                <svg class="w-6 h-6 cursor-pointer opacity-70 hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            
            <nav class="mt-6 px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/5 transition opacity-80 hover:opacity-100">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </a>
                <a href="manageJobs.html" class="flex items-center px-4 py-3 bg-white/10 rounded-lg text-sm font-medium transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Manage Jobs
                </a>
                <a href="reports.html" class="flex items-center px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/5 transition opacity-80 hover:opacity-100">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>

                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-200 bg-white">
            <h2 class="text-gray-500 font-medium">Manage Jobs</h2>
            <div class="flex items-center space-x-6">
                <button class="text-gray-500 hover:text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </button>
                <div class="flex items-center space-x-2">
                    <div class="w-8 h-8 rounded-full bg-gray-200"></div>
                    <span class="text-sm font-semibold">Admin</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Manage Job Vacancies</h1>
                    <p class="text-sm text-gray-500 mt-1">Here is a list of all jobs currently published on the platform.</p>
                </div>
                <a href="addJob.html" class="mt-4 md:mt-0 px-5 py-2.5 bg-[#1D4ED8] rounded-lg text-sm font-medium text-white hover:bg-blue-800 transition shadow-sm flex items-center inline-block text-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Job
                </a>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-sm font-semibold text-gray-700">
                                <th class="px-6 py-4">Job Title</th>
                                <th class="px-6 py-4">Company</th>
                                <th class="px-6 py-4">Location</th>
                                <th class="px-6 py-4 text-center">Action</th>
                            </tr>
                        </thead>
                        
                        <tbody class="text-sm text-gray-600 divide-y divide-gray-200" id="admin-jobs-list">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Run this code immediately when the page loads
        document.addEventListener('DOMContentLoaded', fetchAndDisplayJobs);

        // 1. Function to Fetch Jobs
        async function fetchAndDisplayJobs() {
            const tableBody = document.getElementById('admin-jobs-list');
            tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center">Loading jobs...</td></tr>';

            try {
                // Hitting the public GET route we created
                const response = await fetch('http://localhost:8000/api/v1/jobs/');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch jobs');
                }

                const jobs = await response.json();
                tableBody.innerHTML = ''; // Clear loading text

                if (jobs.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No jobs published yet.</td></tr>';
                    return;
                }

                // Loop through the data and build a row for each job
                jobs.forEach(job => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50 transition';
                    
                    // Note: Date posted changed to Location since our model didn't have a date field
                    row.innerHTML = `
                        <td class="px-6 py-4 font-medium text-gray-900">${job.title}</td>
                        <td class="px-6 py-4">${job.company}</td>
                        <td class="px-6 py-4">${job.location || 'Remote'}</td>
                        <td class="px-6 py-4 flex items-center justify-center space-x-3">
                            <a href="editJob.html?id=${job.id}" class="inline-block px-3 py-1.5 border border-[#2563EB] text-[#2563EB] text-xs font-medium rounded hover:bg-blue-50 transition">
                                 Update
                            </a>
                            <button onclick="deleteJob(${job.id})" class="px-3 py-1.5 bg-red-500 text-white text-xs font-medium rounded hover:bg-red-600 transition">
                                Delete
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error("Error:", error);
                tableBody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-red-500">Failed to load jobs. Check server connection.</td></tr>';
            }
        }

        // 2. Function to Delete a Job
        async function deleteJob(jobId) {
            // Confirm with user before deleting
            if (!confirm("Are you sure you want to delete this job? This cannot be undone.")) {
                return;
            }

            // Grab the admin token from local storage
            const token = localStorage.getItem('adminToken');
            if (!token) {
                alert("You are not logged in! Please log in first.");
                window.location.href = 'login.html';
                return;
            }

            try {
                // Make the DELETE request
                const response = await fetch(`http://localhost:8000/api/v1/jobs/${jobId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}` // The Bouncer needs this!
                    }
                });

                if (response.ok) {
                    // Success! Refresh the list to remove the deleted job
                    fetchAndDisplayJobs();
                } else {
                    const errorData = await response.json();
                    alert("Failed to delete job: " + (errorData.detail || "Unknown error"));
                }
            } catch (error) {
                console.error("Error deleting job:", error);
                alert("A network error occurred while trying to delete.");
            }
        }
    </script>
</body>
