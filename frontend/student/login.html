<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Freshr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased flex flex-col min-h-screen justify-between">

    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold transition-transform group-hover:scale-105 shadow-md">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">Freshr</span>
            </a>
            <a href="signup.html" class="text-sm font-medium text-gray-500 hover:text-blue-600 transition">New here? <span class="text-blue-600">Register</span></a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white border border-gray-200 rounded-2xl shadow-xl shadow-gray-200/50 max-w-md w-full p-8 sm:p-10">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight mb-2">Welcome back</h1>
                <p class="text-sm text-gray-500">Log in to manage your AI job matches and CVs.</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-5">
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-sm transition-all shadow-sm placeholder-gray-400">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-700 hover:underline transition">Forgot password?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-sm transition-all shadow-sm placeholder-gray-400">
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 transition cursor-pointer">
                    <label for="remember" class="ml-2.5 text-sm text-gray-600 cursor-pointer select-none">Remember me on this device</label>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-all text-sm mt-4 shadow-md shadow-blue-500/30 flex justify-center items-center">
                    Log In
                </button>
            </form>

        </div>
    </main>

    <footer class="py-6 text-center bg-white border-t border-gray-200">
        <p class="text-xs text-gray-400 font-medium tracking-wide">© 2026 Freshr.co.ke. All rights reserved.</p>
    </footer>

    <script>
        async function handleLogin(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerText;
            
            // Add a spinner & loading text
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Logging In...
            `;
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            try {
                const formData = new URLSearchParams();
                formData.append('username', email); 
                formData.append('password', password);

                const response = await fetch('http://localhost:8000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 🧹 THE FIX: Clear any old user data before logging the new user in
                    localStorage.clear();
                    
                    // Set the fresh credentials
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('full_name', data.full_name);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Login failed: " + (data.detail || "Incorrect credentials"));
                    submitBtn.innerText = originalBtnText;
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                }

            } catch (error) {
                console.error("Error connecting to the server:", error);
                alert("Could not connect to the server. Is your backend running?");
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
