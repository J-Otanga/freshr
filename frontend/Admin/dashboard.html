<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Freshr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#2563EB] text-white flex flex-col justify-between hidden md:flex">
        <div>
            <div class="h-16 flex items-center justify-between px-6 border-b border-blue-500/30">
                <span class="text-xl font-bold tracking-wide">Freshr</span>
            </div>
            
            <nav class="mt-6 px-4 space-y-2">
                <a href="dashboard.html" class="flex items-center px-4 py-3 bg-white/10 rounded-lg text-sm font-medium transition">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home
                </a>
                <a href="manageJobs.html" class="flex items-center px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/5 transition opacity-80 hover:opacity-100">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Manage Jobs
                </a>
                <a href="reports.html" class="flex items-center px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/5 transition opacity-80 hover:opacity-100">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Reports
                </a>
            </nav>
        </div>

        <div class="mb-6 px-4 space-y-2">
            <a href="#" onclick="logout()" class="flex items-center px-4 py-3 rounded-lg text-sm font-medium hover:bg-white/5 transition opacity-80 hover:opacity-100">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Log Out
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-200 bg-white">
            <h2 class="text-gray-500 font-medium">Home</h2>
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 rounded-full bg-gray-200"></div>
                <span class="text-sm font-semibold">Admin</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
                <div class="bg-white border border-gray-200 rounded-xl p-6 flex flex-col items-center shadow-sm">
                    <p class="text-sm font-medium text-gray-600 mb-1">Active Users</p>
                    <p id="stat-users" class="text-2xl font-semibold text-gray-900">0</p>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl p-6 flex flex-col items-center shadow-sm">
                    <p class="text-sm font-medium text-gray-600 mb-1">CVs Generated</p>
                    <p id="stat-cvs" class="text-2xl font-semibold text-gray-900">0</p>
                </div>
                <div class="bg-white border border-gray-200 rounded-xl p-6 flex flex-col items-center shadow-sm">
                    <p class="text-sm font-medium text-gray-600 mb-1">Available Jobs</p>
                    <p id="stat-jobs" class="text-2xl font-semibold text-gray-900">0</p>
                </div>
            </div>

            <div>
                <h3 class="text-xl font-bold text-gray-900 mb-6">Recent Activity</h3>
                <div class="w-full text-sm text-center border rounded-lg overflow-hidden">
                    <div class="grid grid-cols-4 gap-2 bg-gray-50 font-medium py-3 border-b">
                        <div>Activity</div>
                        <div>Details</div>
                        <div>Date</div>
                        <div>Time</div>
                    </div>
                    <div id="activity-feed">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Auth Guard
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = 'login.html';
            }
        });

        // 2. Logout Function
        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
